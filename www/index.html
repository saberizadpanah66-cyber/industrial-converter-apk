<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>مبدل واحدهای اندازه گیری</title>
  <style>
    :root{
      --bg:#ffffff;
      --panel:#ffffff;
      --panel-soft:#f8fafc;
      --text:#0f172a;
      --muted:#64748b;
      --line:#dbe4f0;
      --blue:#2563eb;
      --cyan:#06b6d4;
      --teal:#0f766e;
      --purple:#7c3aed;
      --orange:#f97316;
      --rose:#e11d48;
      --green:#059669;
      --yellow:#f59e0b;
      --result-bg:#effaf5;
      --result-text:#065f46;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:tahoma,arial,sans-serif;
      background:
        radial-gradient(circle at top right, rgba(37,99,235,.08), transparent 26%),
        radial-gradient(circle at top left, rgba(124,58,237,.08), transparent 22%),
        linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      color:var(--text);
      min-height:100vh;
      padding:18px;
    }

    .app{max-width:820px;margin:0 auto}

    .header{
      margin:10px 0 18px;
      padding:18px;
      border:1px solid var(--line);
      border-radius:24px;
      background:
        linear-gradient(135deg, rgba(37,99,235,.05), rgba(6,182,212,.04)),
        #ffffff;
      box-shadow:0 14px 34px rgba(15,23,42,.08);
      position:relative;
      overflow:hidden;
    }

    .header::before{
      content:"";
      position:absolute;
      inset:0 auto 0 0;
      width:8px;
      background:linear-gradient(180deg,var(--blue),var(--cyan),var(--purple),var(--orange));
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }

    .header-copy{flex:1;text-align:right}

    .header h1{
      margin:0;
      font-size:31px;
      line-height:1.45;
      letter-spacing:-.5px;
      color:#0b1324;
    }

    .brand-logo{
      width:210px;
      min-width:210px;
      height:auto;
      object-fit:contain;
      display:block;
      filter:drop-shadow(0 8px 18px rgba(15,23,42,.12));
      background:#fff;
      border-radius:18px;
      padding:8px;
      border:1px solid #eef2f7;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:0 10px 28px rgba(15,23,42,.06);
    }

    .card-title-bar{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }

    .dot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--orange),var(--rose));
      box-shadow:18px 0 0 var(--cyan), 36px 0 0 var(--purple);
      margin-left:32px;
    }

    label{
      display:block;
      margin:10px 0 7px;
      color:#1e3a5f;
      font-weight:bold;
      font-size:14px;
    }

    .row3{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }

    input,select{
      width:100%;
      padding:13px;
      border-radius:14px;
      border:1px solid #d8e1ec;
      background:#ffffff;
      color:var(--text);
      font-size:16px;
      outline:none;
      transition:.15s ease;
    }

    input:focus,select:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 4px rgba(37,99,235,.10);
    }

    button{
      width:100%;
      padding:14px;
      border:0;
      border-radius:14px;
      background:linear-gradient(135deg,var(--blue),var(--cyan),var(--purple));
      color:#ffffff;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      margin-top:12px;
      box-shadow:0 12px 24px rgba(37,99,235,.16);
    }

    button:active{transform:scale(.99)}

    .result{
      margin-top:14px;
      padding:16px;
      border-radius:16px;
      background:var(--result-bg);
      border:1px dashed #9ad6bc;
      line-height:2;
      font-size:17px;
      direction:ltr;
      text-align:left;
      white-space:pre-wrap;
      color:var(--result-text);
    }

    .quick-title{
      margin:13px 0 8px;
      font-size:13px;
      font-weight:bold;
      color:#475569;
    }

    .chips{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:8px;
      margin-top:12px;
      overflow:visible;
      padding:0;
    }

    .chip{
      border:1px solid #d9e4ef;
      background:linear-gradient(135deg,#ffffff,#f8fbff);
      border-radius:12px;
      padding:9px 6px;
      color:#1e3a5f;
      font-size:11.5px;
      cursor:pointer;
      user-select:none;
      transition:.15s ease;
      text-align:center;
      white-space:nowrap;
      box-shadow:0 4px 12px rgba(15,23,42,.04);
      min-width:0;
    }

    .chip:hover{
      border-color:var(--cyan);
      color:var(--purple);
      transform:translateY(-1px);
    }



    h3{
      margin:0;
      font-size:18px;
      color:#0f172a;
    }

    table{
      width:100%;
      table-layout:fixed;
      border-collapse:separate;
      border-spacing:0;
      font-size:14px;
      margin-top:8px;
      overflow:hidden;
      border-radius:14px;
      border:1px solid #e5edf6;
    }

    td,th{
      border-bottom:1px solid #ecf1f6;
      padding:11px 10px;
      text-align:right;
      background:#fff;
    }

    th{
      color:#0f172a;
      background:linear-gradient(90deg, rgba(6,182,212,.12), rgba(37,99,235,.08), rgba(124,58,237,.10));
      font-weight:bold;
    }

    tr:last-child td{border-bottom:0}

    .footer{
      text-align:center;
      color:#475569;
      font-size:13px;
      margin:22px 0 8px;
    }


    .ltr{
      direction:ltr;
      unicode-bidi:isolate;
      display:inline-block;
      text-align:left;
    }

    .chip{
      direction:ltr;
      unicode-bidi:isolate;
    }

    table td{
      direction:ltr;
      unicode-bidi:isolate;
      text-align:left;
    }

    table th{
      text-align:right;
    }


    table th,
    table td{
      width:50%;
      vertical-align:middle;
    }

    table td{
      text-align:center;
      direction:ltr;
      unicode-bidi:isolate;
      font-size:14px;
    }

    table th{
      text-align:center;
      font-size:14px;
    }

    @media(max-width:620px){
      body{padding:12px}
      .row3{grid-template-columns:1fr}
      .header{padding:14px}
      .topbar{gap:10px}
      .header h1{font-size:20px}
      .brand-logo{width:150px;min-width:150px}
      .chips{grid-template-columns:repeat(4, 1fr);gap:6px}.chip{font-size:10.5px;padding:8px 4px}
    }
  
    @media(max-width:380px){
      .chip{font-size:10px;padding:8px 3px}
      .chips{gap:5px}
    }

  </style>
</head>

  <div class="card">
    <div class="row3">
      <div><label>دسته</label><select id="category"></select></div>
      <div><label>از واحد</label><select id="fromUnit"></select></div>
      <div><label>به واحد</label><select id="toUnit"></select></div>
    </div>

    <label>مقدار</label>
    <input id="value" type="text" inputmode="decimal" placeholder="مثلاً 25 یا 3/4" />

    <button onclick="convert()">تبدیل کن</button>
    <div id="result" class="result">نتیجه اینجا نمایش داده می‌شود.</div>
    <div class="quick-title">تبدیلات سریع</div>
    <div class="chips" id="quickChips"></div>
  </div>

  <div class="card">
    <div class="card-title-bar">
      <div class="dot"></div>
      <h3>جدول‌های پرکاربرد</h3>
    </div>
    <table>
      <tr><th>تبدیل</th><th>معادل</th></tr>
      <tr><td><span class="ltr">1 inch</span></td><td><span class="ltr">25.4 mm</span></td></tr>
      <tr><td><span class="ltr">1 MPa</span></td><td><span class="ltr">10 bar = 145.038 PSI</span></td></tr>
      <tr><td><span class="ltr">1 bar</span></td><td><span class="ltr">14.5038 PSI</span></td></tr>
      <tr><td><span class="ltr">1 HP</span></td><td><span class="ltr">0.746 kW</span></td></tr>
      <tr><td><span class="ltr">1 kg</span></td><td><span class="ltr">2.2046 lb</span></td></tr>
      <tr><td><span class="ltr">1 m³</span></td><td><span class="ltr">1000 L</span></td></tr>
    </table>
  </div>

  <div class="footer">تهیه شده در واحد فنی</div>
</div>

<script>
const data = {
  'طول': {base:'m', units:{'mm':0.001,'cm':0.01,'m':1,'inch':0.0254,'ft':0.3048}},
  'فشار': {base:'Pa', units:{'Pa':1,'kPa':1000,'bar':100000,'MPa':1000000,'PSI':6894.757293}},
  'گشتاور': {base:'N·m', units:{'N·m':1,'kgf·m':9.80665,'lb·ft':1.355817948,'lb·in':0.112984829}},
  'نیرو': {base:'N', units:{'N':1,'kN':1000,'ton-force':9806.65,'lbf':4.448221615}},
  'جرم / وزن': {base:'kg', units:{'g':0.001,'kg':1,'ton':1000,'lb':0.45359237,'oz':0.028349523}},
  'توان': {base:'W', units:{'W':1,'kW':1000,'HP':745.699872,'BTU/h':0.29307107}},
  'حجم': {base:'L', units:{'mL':0.001,'cm³':0.001,'L':1,'m³':1000,'US gallon':3.785411784}},
  'سرعت': {base:'m/s', units:{'m/s':1,'km/h':0.277777778,'mph':0.44704,'ft/min':0.00508}}
};
const tempUnits = ['°C','°F','K'];
const quick = [
  ['1','inch','mm','طول'],
  ['3/4','inch','mm','طول'],
  ['1/2','inch','mm','طول'],
  ['25','MPa','bar','فشار'],
  ['25','MPa','PSI','فشار'],
  ['10','HP','kW','توان'],
  ['1000','L','m³','حجم'],
  ['90','km/h','m/s','سرعت']
];

const cat = document.getElementById('category');
const from = document.getElementById('fromUnit');
const to = document.getElementById('toUnit');

Object.keys(data).concat(['دما']).forEach(c => cat.add(new Option(c,c)));

cat.onchange = fillUnits;
from.onchange = convert;
to.onchange = convert;
document.getElementById('value').oninput = convert;

function fillUnits(){
  from.innerHTML = '';
  to.innerHTML = '';
  const units = cat.value === 'دما' ? tempUnits : Object.keys(data[cat.value].units);
  units.forEach(u => {
    from.add(new Option(u,u));
    to.add(new Option(u,u));
  });
  if(units.includes('mm')){from.value='inch'; to.value='mm';}
  if(cat.value==='فشار'){from.value='bar'; to.value='PSI';}
  if(cat.value==='دما'){from.value='°C'; to.value='°F';}
  convert();
}

function parseVal(v){
  let s = String(v).trim().replace(',', '.');
  if(s.includes('/')){
    let parts = s.split('/').map(x => Number(String(x).trim()));
    if(parts.length === 2 && isFinite(parts[0]) && isFinite(parts[1]) && parts[1] !== 0) return parts[0] / parts[1];
    return NaN;
  }
  return Number(s);
}

function fmt(n){
  if(!isFinite(n)) return '-';
  return Number(n.toFixed(6)).toLocaleString('en-US');
}

function tempConvert(v,f,t){
  let c = f==='°C' ? v : f==='°F' ? (v-32)*5/9 : v-273.15;
  return t==='°C' ? c : t==='°F' ? c*9/5+32 : c+273.15;
}

function convert(){
  const raw = document.getElementById('value').value;
  if(raw === ''){
    document.getElementById('result').textContent='نتیجه اینجا نمایش داده می‌شود.';
    return;
  }

  const v = parseVal(raw);
  if(!isFinite(v)){
    document.getElementById('result').textContent='عدد معتبر وارد کن.';
    return;
  }

  let res;
  if(cat.value==='دما') res = tempConvert(v,from.value,to.value);
  else res = v * data[cat.value].units[from.value] / data[cat.value].units[to.value];

  document.getElementById('result').textContent = `${raw} ${from.value} = ${fmt(res)} ${to.value}`;
}

function makeChips(){
  const box = document.getElementById('quickChips');
  quick.forEach(q => {
    let b = document.createElement('span');
    b.className='chip';
    b.dir='ltr';
    b.textContent=`${q[0]} ${q[1]} → ${q[2]}`;
    b.onclick = () => {
      cat.value=q[3];
      fillUnits();
      document.getElementById('value').value=q[0];
      from.value=q[1];
      to.value=q[2];
      convert();
    };
    box.appendChild(b);
  });
}

fillUnits();
makeChips();
</script>
